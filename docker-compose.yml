version: '3.8'

services:
  supr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: supr-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_PASSWORD=${APP_PASSWORD}
      - SQLITE_DB_PATH=/app/.agents/supr_local.db
    volumes:
      # Persist agent profiles and the SQLite database
      - ./data/agents:/app/.agents
      # Persist sandboxed workspace I/O
      - ./data/workspaces:/app/supr_workspaces
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=512M
      - /app/.next/cache:mode=1777,size=256M
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/auth/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
