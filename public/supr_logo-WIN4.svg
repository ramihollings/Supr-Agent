<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Background -->
  <rect width="500" height="500" fill="#121212" />
  
  <!-- Grid Pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f1f1f" stroke-width="1"/>
    </pattern>
    
    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <rect width="500" height="500" fill="url(#grid)" />

  <!-- Brutalist Drop Shadow Background Box -->
  <rect x="70" y="160" width="360" height="180" fill="#0055FF" />
  
  <!-- Main Container Box -->
  <rect x="50" y="140" width="360" height="180" fill="#1a1a1a" stroke="#ffffff" stroke-width="6" />

  <!-- Accent Top Bar -->
  <rect x="53" y="143" width="354" height="20" fill="#FF4400" />
  
  <!-- Decorative Nodes -->
  <circle cx="70" cy="153" r="4" fill="#1a1a1a" />
  <circle cx="90" cy="153" r="4" fill="#1a1a1a" />
  <circle cx="110" cy="153" r="4" fill="#1a1a1a" />

  <!-- Code/Terminal Prompt Graphic -->
  <text x="70" y="210" font-family="monospace" font-size="20" fill="#0055FF" font-weight="bold">></text>
  
  <!-- SUPR Text -->
  <text x="100" y="270" font-family="'Inter', 'Arial Black', sans-serif" font-size="90" fill="#ffffff" font-weight="900" letter-spacing="-4">SUPR</text>

  <!-- Subtitle -->
  <text x="105" y="300" font-family="monospace" font-size="14" fill="#888888" font-weight="bold" letter-spacing="4">ORCHESTRATOR NODE</text>

  <!-- Warning Stripes -->
  <g transform="translate(370, 280)">
    <line x1="0" y1="0" x2="20" y2="-20" stroke="#FF4400" stroke-width="4" />
    <line x1="10" y1="0" x2="30" y2="-20" stroke="#FF4400" stroke-width="4" />
    <line x1="20" y1="0" x2="40" y2="-20" stroke="#FF4400" stroke-width="4" />
  </g>

  <!-- Crosshair graphic -->
  <g transform="translate(420, 100)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#0055FF" stroke-width="2" />
    <line x1="-25" y1="0" x2="-5" y2="0" stroke="#0055FF" stroke-width="2" />
    <line x1="5" y1="0" x2="25" y2="0" stroke="#0055FF" stroke-width="2" />
    <line x1="0" y1="-25" x2="0" y2="-5" stroke="#0055FF" stroke-width="2" />
    <line x1="0" y1="5" x2="0" y2="25" stroke="#0055FF" stroke-width="2" />
  </g>
</svg>
