steps:
  - name: node:20
    entrypoint: npm
    args: ['ci']
  - name: node:20
    entrypoint: npm
    args: ['run', 'test:unit']
  - name: node:20
    entrypoint: npm
    args: ['run', 'test:security']
  - name: node:20
    entrypoint: npm
    args: ['run', 'build']
  - name: gcr.io/cloud-builders/docker
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/$PROJECT_ID/supr-repo/supr:$COMMIT_SHA', '.']
  - name: gcr.io/cloud-builders/docker
    args: ['push', '${_REGION}-docker.pkg.dev/$PROJECT_ID/supr-repo/supr:$COMMIT_SHA']

substitutions:
  _REGION: us-central1

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/supr-repo/supr:$COMMIT_SHA'
