steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/supr-agent:$COMMIT_SHA', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/supr-agent:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'supr-agent'
      - '--image'
      - 'gcr.io/$PROJECT_ID/supr-agent:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      # Note: Service account needs Cloud Run Invoker and Storage Admin roles
      # - '--service-account'
      # - 'supr-runner@$PROJECT_ID.iam.gserviceaccount.com'
      # Volume mounts for SQLite and Agents must be configured manually via CLI or Terraform first.
      
images:
  - 'gcr.io/$PROJECT_ID/supr-agent:$COMMIT_SHA'
