apiVersion: v1
kind: Pod
metadata:
  name: supr-agent-sandbox-template
  namespace: supr
  labels:
    app: supr-agent-sandbox
spec:
  # Enforce gVisor kernel-level virtualization for sandboxing
  runtimeClassName: gvisor

  # Absolute isolation: do not mount Kubernetes API tokens to prevent lateral movement
  automountServiceAccountToken: false

  # High availability restart policy: sandboxes run tasks and exit
  restartPolicy: Never

  containers:
  - name: sandbox-runtime
    image: us-central1-docker.pkg.dev/project-cc5e59a9-05a9-4613-9db/supr-repo/supr-agent:latest
    imagePullPolicy: IfNotPresent
    command: ["/bin/bash", "-c"]
    args: ["echo 'Sandbox Ready'; sleep 3600"] # Kept alive for orchestration tasks
    
    securityContext:
      # Restrict runtime privileges
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      runAsUser: 1001
      runAsGroup: 1001
      capabilities:
        drop:
        - ALL

    resources:
      limits:
        cpu: "1"
        memory: 1Gi
      requests:
        cpu: "250m"
        memory: 256Mi

    env:
    - name: NODE_ENV
      value: "production"
    - name: CLOAKBROWSER_PATH
      value: "/usr/bin/cloakbrowser"
