apiVersion: v1
kind: Namespace
metadata:
  name: supr

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: supr-orchestrator
  namespace: supr
  labels:
    app: supr-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supr-orchestrator
  template:
    metadata:
      labels:
        app: supr-orchestrator
    spec:
      # RULE: Enforce secure user-space kernel via gVisor
      runtimeClassName: gvisor
      
      # RULE: Prevent container escapes from exfiltrating GCP API tokens
      automountServiceAccountToken: false

      containers:
      - name: supr-app
        image: us-central1-docker.pkg.dev/project-cc5e59a9-05a9-4613-9db/supr-repo/supr-agent:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        
        env:
        - name: PORT
          value: "3001"
        - name: NODE_ENV
          value: "production"
        
        # Inject secrets from Cloud Secret Manager
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: supr-secrets
              key: DATABASE_URL
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: supr-secrets
              key: GEMINI_API_KEY
        - name: APP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: supr-secrets
              key: APP_PASSWORD

        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "500m"
            memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: supr-service
  namespace: supr
spec:
  type: ClusterIP
  ports:
  - port: 3001
    targetPort: 3001
    protocol: TCP
  selector:
    app: supr-orchestrator
