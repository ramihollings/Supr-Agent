# Horizontal Pod Autoscaler for the orchestrator.
#
# The orchestrator is a single-replica stateful workload today (the
# SQLite database lives on a GCS-FUSE mount that cannot be shared
# by two pods at once), so this HPA intentionally targets a minimum
# of 1 replica and a maximum of 1. The HPA resource is here so the
# moment we move to a horizontally-scalable runtime (Postgres + a
# shared event bus), the autoscaling contract is already wired: we
# just bump `maxReplicas`.
#
# When that day comes, also delete the `strategy: Recreate` on the
# Deployment and switch to `RollingUpdate`.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: supr-orchestrator
  namespace: supr
  labels:
    app: supr-orchestrator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: supr-orchestrator
  minReplicas: 1
  maxReplicas: 1
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 0
